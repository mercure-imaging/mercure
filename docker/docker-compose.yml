x-build: &build
  context: ..
  args:
    VERSION_TAG: ${TAG:-latest}
    BASE_IMAGE_NAME: mercureimaging/mercure-base

x-env: &env
  environment:
    MERCURE_RUNNER: docker

x-docker-user: &docker-user
  user: "${UID}:${DOCKER_GID}"
x-user: &user
  user: "${UID}:${GID}"

services:
  base:
    image: mercureimaging/mercure-base:${TAG:-latest}
    build:
      context: ..
      dockerfile: docker/base/Dockerfile
    profiles: [build]

  ui:
    <<: [*docker-user, *env]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      worker_fast:
        condition: service_started
      worker_slow:
        condition: service_started
    environment:
      MERCURE_RUNNER: docker
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    image: mercureimaging/mercure-ui${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/ui/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro
      - /opt/mercure/config/webgui.env:/opt/mercure/config/webgui.env:ro
      - /opt/mercure/config/users.json:/opt/mercure/config/users.json
      - /var/run/docker.sock:/var/run/docker.sock

  db:
    image: library/postgres:14-alpine
    restart: always
    env_file:
      - /opt/mercure/config/db.env
    environment:
      POSTGRES_USER: mercure
      POSTGRES_DB: mercure
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "15432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mercure" ]

  receiver:
    <<: [*user, *env]
    image: mercureimaging/mercure-receiver${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/receiver/Dockerfile
    restart: always
    depends_on:
      bookkeeper:
        condition: service_healthy
    ports:
      - "11112:11112"
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro

  cleaner:
    <<: [*user, *env]
    image: mercureimaging/mercure-cleaner${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/cleaner/Dockerfile
    restart: always
    depends_on:
      bookkeeper:
        condition: service_healthy
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro

  dispatcher:
    <<: [*user, *env]
    image: mercureimaging/mercure-dispatcher${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/dispatcher/Dockerfile
    restart: always
    depends_on:
      bookkeeper:
        condition: service_healthy
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro

  processor:
    <<: [*docker-user, *env]
    image: mercureimaging/mercure-processor${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/processor/Dockerfile
    restart: always
    depends_on:
      bookkeeper:
        condition: service_healthy
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro
      - /var/run/docker.sock:/var/run/docker.sock

  router:
    <<: [*user, *env]
    image: mercureimaging/mercure-router${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/router/Dockerfile
    restart: always
    depends_on:
      bookkeeper:
        condition: service_healthy
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro

  bookkeeper:
    <<: [*user, *env]
    image: mercureimaging/mercure-bookkeeper${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/bookkeeper/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro
      - /opt/mercure/config/bookkeeper.env:/opt/mercure/config/bookkeeper.env:ro

  redis:
    image: redis
    restart: always
    command: ["sh", "-c", "test -n \"$$REDIS_PASSWORD\" || { echo 'ERROR: REDIS_PASSWORD is not set'; exit 1; } && exec redis-server --save 20 1 --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-cache:/data

  worker_fast:
    <<: *user
    image: mercureimaging/mercure-worker${IMAGE_TAG}
    build:
      <<: *build
      dockerfile: docker/worker/Dockerfile
    restart: always
    depends_on:
      - redis
    deploy:
      replicas: 2
    environment:
      WORKER_QUEUE: mercure_fast
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro

  worker_slow:
    <<: *user
    image: mercureimaging/mercure-worker${IMAGE_TAG}
    restart: always
    depends_on:
      - redis
    deploy:
      replicas: 2
    environment:
      WORKER_QUEUE: mercure_slow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - data:/opt/mercure/data
      - /opt/mercure/config/mercure.json:/opt/mercure/config/mercure.json:ro
      - /opt/mercure/config/services.json:/opt/mercure/config/services.json:ro

volumes:
  db-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/opt/mercure/db'

  data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/opt/mercure/data'

  redis-cache:
    driver: local
